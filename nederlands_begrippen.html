<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Latijn Basiswoorden - CSV Import</title>
    <style>
        :root { --primary: #2c3e50; --orange: #f39c12; --blue: #3498db; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        /* Flitskaart */
        .scene { width: 100%; max-width: 380px; height: 260px; perspective: 1000px; margin: 20px 0; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.4s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 25px; padding: 25px; box-sizing: border-box; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.1); background: white; border: 1px solid #ddd; }
        .card-front { color: var(--primary); font-size: 1.6rem; font-weight: 800; }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); font-size: 1.4rem; }
        
        .label { font-size: 0.7rem; text-transform: uppercase; margin-bottom: 10px; opacity: 0.5; letter-spacing: 1px; }
        .star { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: var(--orange); display: none; }
        .is-marked .star { display: block; }
        .is-marked .card-face { border: 3px solid var(--orange); }
        
        .speak-btn { margin-top: 20px; background: var(--blue); color: white; border: none; border-radius: 50%; width: 55px; height: 55px; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        /* Knoppen */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 380px; }
        button { padding: 15px; border: none; border-radius: 15px; background: white; color: var(--primary); font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 0.9rem; }
        .btn-orange { background: var(--orange); color: white; grid-column: span 2; }
        .btn-blue { background: var(--blue); color: white; grid-column: span 2; }
        .btn-dark { background: var(--primary); color: white; grid-column: span 2; }
        
        /* Lijst weergave */
        #list-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .search-box { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; font-size: 1rem; }
        .word-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .word-item .fr { font-weight: bold; }
        .word-item .nl { color: #666; }
        .sort-bar { display: flex; gap: 10px; margin-bottom: 10px; }
        .sort-bar button { flex: 1; padding: 8px; font-size: 0.7rem; background: #eee; }
        .sort-bar button.active { background: var(--primary); color: white; }
        .progress { margin-top: 15px; color: #7f8c8d; font-size: 0.85rem; font-weight: bold; }
        .close-list { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; padding: 15px 25px; border-radius: 30px; z-index: 20; }
    </style>
</head>
<body>

    <h3 style="color: var(--primary); margin-top: 10px;">Latijn basiswoorden</h3>

    <div class="scene" onclick="flip()">
        <div class="card" id="card-element">
            <div class="card-face card-front">
                <div class="star">★</div>
                <div class="label" id="label-front">Latijn</div>
                <div id="text-front">...</div>
                <button class="speak-btn" id="speak-btn" onclick="event.stopPropagation(); speak();">🔊</button>
            </div>
            <div class="card-face card-back">
                <div class="label" id="label-back">Nederlands</div>
                <div id="text-back">...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prev()">⬅️ Vorige</button>
        <button onclick="next()">Volgende ➡️</button>
        <button class="btn-orange" onclick="mark()">❌ Ken ik nog niet</button>
        <button onclick="shuffle()">🔀 Husselen</button>
        <button id="lang-btn" onclick="toggleLang()">🔄 NL ➔ LA</button>
        <button id="filter-btn" onclick="toggleFilter()">Focus op moeilijk (0)</button>
        <button class="btn-blue" onclick="openList()">📋 Woordenlijst & Zoeken</button>
        <button class="btn-dark" style="opacity: 0.5; font-size: 0.7rem;" onclick="resetProgress()">🗑️ Voortgang wissen</button>
    </div>

    <div class="progress" id="progress">Kaart 1 van ...</div>

    <div id="list-modal">
        <div style="position: sticky; top: 0; background: white; padding-bottom: 10px;">
            <input type="text" class="search-box" id="search-input" placeholder="Zoek woord..." oninput="renderList()">
            <div class="sort-bar">
                <button id="sort-std" class="active" onclick="setSort('std')">Standaard</button>
                <button id="sort-diff" onclick="setSort('diff')">Moeilijk ★</button>
            </div>
        </div>
        <div id="list-container"></div>
        <button class="close-list" onclick="closeList()">SLUITEN ✖</button>
    </div>

    <script>
        // --- PLAK HIERONDER JE EXCEL DATA (CSV-formaat: Latijn,Nederlands) ---
        const csvData = `"deus, mv dei","god"
"est","(hij/zij/het) is"
"esse","zijn"
"in","in, op"
"Olympus","de Olympus"
"habitat","(hij/zij) woont"
"habitare","wonen"
"rex, mv reges","koning"
"et","en"
"sunt","(zij) zijn"
"frater, mv fratres","broer"
"non","niet"
"semper","altijd"
"saepe","dikwijls"
"ibi","daar"
"Tartarus","de Tartarus (diepste plaats in de onderwereld)"
"vivit","(hij/zij) leeft"
"vivere","leven"
"terra","aarde"
"locus","plaats"
"obscurus","donker"
"nox, mv noctes","nacht"
"umbra, mv umbrae","1 schim (van gestorven mensen) 2 schaduw"
"huc","hierheen"
"veniunt","(zij) komen"
"venire","komen"
"hic bijw.","hier"
"dea","godin"
"soror, sorores","zuster"
"uxor, uxores","vrouw, echtgenote"
"quoque","ook (staat achter het woord waarbij het hoort)"
"mater, matres","moeder"
"pater, patres","vader"
"filia","dochter"
"insula","eiland"
"ubi","waar"
"silva","bos"
"flos, flores m","bloem"
"florēre","bloeien"
"puella","meisje"
"ludere","spelen"
"ager, agri mv (groep 2)","akker"
"per + acc.","over, door ... heen"
"errare","(rond)zwerven, dwalen"
"explorare","onderzoeken, inspecteren"
"quattuor onverbuigb.","vier"
"equus","paard"
"trahere","trekken"
"ecce onverbuigb.","kijk"
"amica","vriendin"
"appropinquare","naderen"
"intrare","binnengaan, -komen"
"legere","verzamelen"
"ridēre","lachen"
"audire","horen"
"vidēre","zien"
"statim bijw.","meteen"
"amare","beminnen, verliefd zijn op"
"temptare","proberen"
"fugere/io","vluchten"
"sed","maar"
"in + acc.","naar ... (binnen), in (richting)"
"exclamare","uitroepen"
"servare","redden"
"rapere/io","roven, meesleuren"
"audēre","durven"
"enim","want, immers"
"timere","vrezen, bang zijn (voor + acc.)"
"deinde","vervolgens"
"aperire","openen"
"sub + acc.","onder (richting)"
"Iuppiter, Iovem acc.","Jupiter"
"Pluto, Plutonem acc.","Pluto"
"regina","koningin"
"nunc","nu"
"sedēre","zitten"
"inter + acc.","tussen, temidden van"
"gaudēre","blij zijn, zich verheugen"
"dolēre","verdrietig zijn"
"nam","want"
"iuvare","helpen"
"reddere","teruggeven"
"cogitare","(na)denken"
"nec ... nec","noch ... noch, niet ... en ook niet"
"laedere","kwetsen, beledigen"
"cupere/io","willen, begeren, verlangen"
"consilium","besluit, plan"
"capere/io","nemen"
"annus","jaar"
"dividere","verdelen"
"sex onverbuigb.","zes"
"tum bijw.","toen, dan"
"curare","zorgen (voor + acc.)"
"mille onverbuigb.","duizend"
"petere","zoeken, vragen"
"autem","echter"
"claudere","sluiten"
"recipere/io","ontvangen, opnemen"
"tandem","eindelijk"
"senex, senes","oude man"
"dicere","zeggen"
"nusquam","nergens"
"dormire","slapen"
"respondēre","antwoorden"
"quis","wie?"
"praemium","beloning"
"dare","geven"
"quid","wat?"
"optare","wensen"
"diu","lang, lange tijd"
"divitiae mv","rijkdom, schatten"
"sacerdos, otes","priester"
"simul bijw.","tegelijk(ertijd)"
"vita","(het) leven"
"fīnire","beëindigen"
"evenire","uitkomen"
"colere","1 verzorgen 2 vereren"
"dum + praes.","terwijl"
"ante + acc.","voor"
"templum","tempel"
"stare","staan"
"corpus, ora","lichaam"
"subito bijw.","plotseling"
"arbor, ores","boom"
"mutare","veranderen (in + acc.)"
"tangere","aanraken"
"cum voegv.","wanneer, toen"
"ventus","wind"
"movēre","bewegen"
"et","1 en 2 ook"
"vale (-te)","vaarwel"
"sacrum facere/io","offeren"
"femina","vrouw"
"cur","waarom"
"sacrum","offer"
"facere/io","1 doen 2 maken"
"praeferre","verkiezen (boven + dat.)"
"genus, genera","afkomst, geslacht"
"avus","grootvader"
"gens, gentes","volk"
"coniunx, iuges","1 echtgenoot 2 echtgenote"
"septem onverbuigb.","zeven"
"filius","zoon"
"fortuna","(het) lot"
"numquam","nooit"
"nocēre + dat.","schaden"
"tantum","slechts"
"duo","twee"
"liberi mv","kinderen"
"tamquam","als het ware"
"ideo","daarom"
"suadēre","aanraden"
"parēre + dat.","gehoorzamen (aan)"`;

        // Parser voor CSV data
        const allWords = csvData.trim().split('\n').map(line => {
            const matches = line.match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g);
            if (matches && matches.length >= 2) {
                return { 
                    fr: matches[0].replace(/"/g, '').trim(), 
                    nl: matches[1].replace(/"/g, '').trim() 
                };
            }
            const parts = line.split(',');
            return { fr: parts[0]?.trim(), nl: parts[1]?.trim() };
        }).filter(w => w.fr && w.nl);

        let difficultWords = [];
        let currentList = [...allWords];
        let idx = 0;
        let isNlToFr = false;
        let filterOn = false;
        let sortMode = 'std';

        // Elementen
        const card = document.getElementById('card-element');
        const textFront = document.getElementById('text-front');
        const textBack = document.getElementById('text-back');
        const prog = document.getElementById('progress');

        function load() {
            const saved = JSON.parse(localStorage.getItem('latijn_basiswoorden_v1') || '{}');
            if (saved.diffIndices) difficultWords = saved.diffIndices.map(i => allWords[i]).filter(Boolean);
            if (saved.lastIdx !== undefined) idx = Math.min(saved.lastIdx, currentList.length - 1);
        }

        function save() {
            localStorage.setItem('latijn_basiswoorden_v1', JSON.stringify({ diffIndices: difficultWords.map(w => allWords.indexOf(w)), lastIdx: idx }));
        }

        function update() {
            card.classList.remove('is-flipped');
            const item = currentList[idx];
            if (isNlToFr) {
                textFront.textContent = item.nl;
                textBack.textContent = item.fr;
                document.getElementById('label-front').textContent = "Nederlands";
                document.getElementById('label-back').textContent = "Latijn";
            } else {
                textFront.textContent = item.fr;
                textBack.textContent = item.nl;
                document.getElementById('label-front').textContent = "Latijn";
                document.getElementById('label-back').textContent = "Nederlands";
            }
            prog.textContent = `Kaart ${idx + 1} van ${currentList.length}`;
            card.classList.toggle('is-marked', difficultWords.includes(item));
            document.getElementById('filter-btn').textContent = `Focus op moeilijk (${difficultWords.length})`;
            save();
        }

        function flip() { card.classList.toggle('is-flipped'); }
        function next() { idx = (idx + 1) % currentList.length; update(); }
        function prev() { idx = (idx - 1 + currentList.length) % currentList.length; update(); }
        function shuffle() { currentList.sort(() => Math.random() - 0.5); idx = 0; update(); }
        function toggleLang() { isNlToFr = !isNlToFr; document.getElementById('lang-btn').textContent = isNlToFr ? "🔄 LA ➔ NL" : "🔄 NL ➔ LA"; update(); }
        function mark() {
            const item = currentList[idx];
            if (!difficultWords.includes(item)) difficultWords.push(item);
            else difficultWords = difficultWords.filter(w => w !== item);
            update();
        }
        function toggleFilter() {
            filterOn = !filterOn;
            currentList = filterOn ? [...difficultWords] : [...allWords];
            if (currentList.length === 0 && filterOn) { alert("Geen moeilijke woorden!"); filterOn = false; currentList = [...allWords]; }
            idx = 0; update();
        }
        function speak() {
            const item = currentList[idx];
            const textToSpeak = isNlToFr ? item.nl : item.la;
            const utterance = new SpeechSynthesisUtterance(textToSpeak);

            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => /^it(-|_)?IT$/i.test(v.lang)) || voices.find(v => /^it/i.test(v.lang));

            if (preferredVoice) {
                utterance.voice = preferredVoice;
                utterance.lang = preferredVoice.lang;
            } else {
                utterance.lang = 'it-IT';
            }

            utterance.rate = 0.95;
            utterance.pitch = 1;

            window.speechSynthesis.cancel();
            setTimeout(() => window.speechSynthesis.speak(utterance), 50);
        }

        // Lijst functies
        function openList() { document.getElementById('list-modal').style.display = 'block'; renderList(); }
        function closeList() { document.getElementById('list-modal').style.display = 'none'; }
        function setSort(m) { sortMode = m; document.getElementById('sort-std').className = m==='std'?'active':''; document.getElementById('sort-diff').className = m==='diff'?'active':''; renderList(); }
        
        function renderList() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            let list = allWords.map((w, i) => ({...w, origIdx: i}));
            if (sortMode === 'diff') list.sort((a,b) => difficultWords.includes(allWords[b.origIdx]) - difficultWords.includes(allWords[a.origIdx]));
            
            list.forEach(w => {
                if (w.fr.toLowerCase().includes(q) || w.nl.toLowerCase().includes(q)) {
                    const div = document.createElement('div');
                    div.className = 'word-item';
                    div.innerHTML = `<div><span class="fr">${w.fr}</span><br><span class="nl">${w.nl}</span></div><span>${difficultWords.includes(allWords[w.origIdx])?'★':''}</span>`;
                    div.onclick = () => { filterOn = false; currentList = [...allWords]; idx = w.origIdx; update(); closeList(); };
                    container.appendChild(div);
                }
            });
        }

        function resetProgress() { if(confirm("Wis voortgang?")) { localStorage.removeItem('latijn_basiswoorden_v1'); location.reload(); } }


        if (typeof speechSynthesis !== 'undefined' && 'onvoiceschanged' in speechSynthesis) {
            speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
        }
        load(); update();
    </script>
</body>
</html>
