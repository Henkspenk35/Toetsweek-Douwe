<head>

        .scene { width: 100%; max-width: 420px; height: 320px; perspective: 1000px; margin: 20px 0; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.4s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 25px; padding: 25px; box-sizing: border-box; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.1); background: white; border: 1px solid #ddd; overflow-wrap: break-word; }
        .card-front { color: var(--primary); }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); }
        .label { font-size: 0.7rem; text-transform: uppercase; margin-bottom: 10px; opacity: 0.55; letter-spacing: 1px; }
        .star { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: var(--orange); display: none; }
        .is-marked .star { display: block; }
        .is-marked .card-face { border: 3px solid var(--orange); }
        .sentence { font-size: 1.45rem; line-height: 1.45; font-weight: 500; }
        .sentence strong { font-weight: 800; }
        .back-word { font-size: 1.65rem; font-weight: 800; margin-bottom: 12px; }
        .back-nl { font-size: 1.2rem; line-height: 1.4; }
        .speak-btn { margin-top: 20px; background: var(--blue); color: white; border: none; border-radius: 50%; width: 55px; height: 55px; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 420px; }
        button { padding: 15px; border: none; border-radius: 15px; background: white; color: var(--primary); font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 0.9rem; }
        .btn-orange { background: var(--orange); color: white; grid-column: span 2; }
        .btn-blue { background: var(--blue); color: white; grid-column: span 2; }
        .btn-dark { background: var(--primary); color: white; grid-column: span 2; }
        #list-modal { display: none; position: fixed; inset: 0; background: white; z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .search-box { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; font-size: 1rem; box-sizing: border-box; }
        .word-item { display: flex; justify-content: space-between; gap: 10px; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .word-item .en { font-weight: bold; }
        .word-item .nl { color: #666; }
        .word-item .ex { color: #888; font-size: 0.9rem; margin-top: 6px; }
        .sort-bar { display: flex; gap: 10px; margin-bottom: 10px; }
        .sort-bar button { flex: 1; padding: 8px; font-size: 0.7rem; background: #eee; }
        .sort-bar button.active { background: var(--primary); color: white; }
        .progress { margin-top: 15px; color: #7f8c8d; font-size: 0.85rem; font-weight: bold; }
        .close-list { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; padding: 15px 25px; border-radius: 30px; z-index: 20; }
    </style>
</head>
<body>
    <h3 style="color: var(--primary); margin-top: 10px;">Engels – zinnen & woordenschat</h3>

    <div class="scene" onclick="flip()">

                <div class="label" id="label-front">Engelse zin</div>
                <div id="text-front" class="sentence">...</div>
                <button class="speak-btn" id="speak-btn" onclick="event.stopPropagation(); speak();">🔊</button>

            <div class="card-face card-back">
                <div class="label" id="label-back">Betekenis</div>
                <div id="text-back">...</div>

        </div>
    </div>

    <div class="controls">
        <button onclick="prev()">⬅️ Vorige</button>
        <button onclick="next()">Volgende ➡️</button>
        <button class="btn-orange" onclick="mark()">❌ Ken ik nog niet</button>
        <button onclick="shuffle()">🔀 Husselen</button>
        <button id="lang-btn" onclick="toggleMode()">🔄 Zin ➔ Woord</button>
        <button id="filter-btn" onclick="toggleFilter()">Focus op moeilijk (0)</button>
        <button class="btn-blue" onclick="openList()">📋 Woordenlijst & Zoeken</button>
        <button class="btn-dark" style="opacity: 0.5; font-size: 0.7rem;" onclick="resetProgress()">🗑️ Voortgang wissen</button>
    </div>

    <div class="progress" id="progress">Kaart 1 van ...</div>

    <div id="list-modal">

        <div id="list-container"></div>
        <button class="close-list" onclick="closeList()">SLUITEN ✖</button>

            { sentence: "My grandad is very <strong>generous</strong>. He always gives us lots of presents.", word: "generous", nl: "gul / vrijgevig" },
            { sentence: "You can put an <strong>ice cube</strong> in your drink to make it colder.", word: "ice cube", nl: "ijsklontje" },
            { sentence: "You sit on a chair and you <strong>lie</strong> in bed.", word: "lie", nl: "liggen" },
            { sentence: "Water is a <strong>liquid</strong>. So is milk.", word: "liquid", nl: "vloeistof" },
            { sentence: "Do you drink tea from a glass or from a <strong>mug</strong>?", word: "mug", nl: "beker / mok" },
            { sentence: "<strong>Normally</strong> Susie goes home after school, but not today.", word: "normally", nl: "gewoonlijk" },
            { sentence: "We <strong>plan</strong> to go to Spain this year.", word: "plan", nl: "van plan zijn" },
            { sentence: "I won't tell anyone, I <strong>promise</strong>.", word: "promise", nl: "beloven" },
            { sentence: "We want to <strong>provide</strong> kids in Africa <strong>with</strong> new shoes.", word: "provide with", nl: "voorzien van" },
            { sentence: "Simon is trying to <strong>raise money</strong> to start a school in Liberia.", word: "raise money", nl: "geld inzamelen" },
            { sentence: "Could you pass me a <strong>slice</strong> of bread, please?", word: "slice", nl: "plak(je) / snee(tje)" },
            { sentence: "When you don't get enough to eat, you <strong>starve</strong>.", word: "starve", nl: "honger lijden / verhongeren" },
            { sentence: "My parents bought a <strong>sofa</strong> that is big enough for all of us to sit on.", word: "sofa", nl: "bank" },
            { sentence: "When your throat hurts, it sometimes helps to <strong>suck</strong> on an ice cube.", word: "suck", nl: "zuigen" },

            { sentence: "Do you want me to <strong>bake</strong> a cake for your birthday?", word: "bake", nl: "bakken" },
            { sentence: "Use a knife to <strong>chop</strong> an onion into small cubes.", word: "chop", nl: "(fijn)hakken / (fijn)snijden" },
            { sentence: "Are you going to come with us? You've got to <strong>decide</strong> now.", word: "decide", nl: "beslissen" },
            { sentence: "Do we have to pay extra for <strong>delivery</strong> of the pizzas?", word: "delivery", nl: "bezorging" },
            { sentence: "Keep the milk in the <strong>fridge</strong>, or it will go bad.", word: "fridge", nl: "koelkast" },
            { sentence: "<strong>Fry</strong> the steak in some butter.", word: "fry", nl: "bakken / frituren" },
            { sentence: "Fry the onions in a <strong>frying pan</strong>.", word: "frying pan", nl: "koekenpan" },
            { sentence: "I fancy a hot chocolate. Could you <strong>heat</strong> some milk for me?", word: "heat", nl: "verhitten / warm maken" },
            { sentence: "My mum is a big fan of <strong>home-made</strong> meals – she cooks every evening.", word: "home-made", nl: "zelfgemaakt / huisgemaakt" },
            { sentence: "First, you chop the onions. <strong>Next</strong>, you fry them.", word: "next", nl: "daarna" },
            { sentence: "Can I <strong>order</strong> a hamburger and some fries, please?", word: "order", nl: "bestellen" },
            { sentence: "We need a <strong>packet</strong> of butter for the cake.", word: "packet", nl: "pak(je)" },
            { sentence: "<strong>Pork</strong> is meat from pigs.", word: "pork", nl: "varkensvlees" },
            { sentence: "The coffee is ready. Can you <strong>pour</strong> a cup for your uncle?", word: "pour", nl: "gieten / (in)schenken" },
            { sentence: "When my dad doesn't have time to cook, we have a <strong>ready-made</strong> meal.", word: "ready-made", nl: "kant-en-klaar" },
            { sentence: "Sushi is made of seaweed and <strong>rice</strong>. Sometimes there is fish in it, too.", word: "rice", nl: "rijst" },
            { sentence: "A <strong>saucepan</strong> is a small, deep pan with a long handle.", word: "saucepan", nl: "steelpan" },
            { sentence: "There's bread in the oven. Doesn't it <strong>smell</strong> lovely?", word: "smell", nl: "ruiken" },
            { sentence: "Bananas are sweet, lemons are <strong>sour</strong>.", word: "sour", nl: "zuur" },
            { sentence: "Sir, would you like your <strong>steak</strong> medium or well-done?", word: "steak", nl: "biefstuk" },
            { sentence: "I want to <strong>try</strong> some Chinese food for a change.", word: "try", nl: "proberen" },
            { sentence: "Look at all those dirty plates! Why didn't you do the <strong>washing-up</strong>?", word: "washing-up", nl: "afwas" }
        ];

        let difficultWords = [];
        let currentList = [...allWords];
        let idx = 0;
        let wordMode = false;
        let filterOn = false;
        let sortMode = 'std';

        const card = document.getElementById('card-element');
        const textFront = document.getElementById('text-front');
        const textBack = document.getElementById('text-back');
        const prog = document.getElementById('progress');

        function load() {
            const saved = JSON.parse(localStorage.getItem('eng_zinnen_u45') || '{}');
            if (saved.diffIndices) difficultWords = saved.diffIndices.map(i => allWords[i]).filter(Boolean);
            if (saved.lastIdx !== undefined) idx = Math.min(saved.lastIdx, Math.max(currentList.length - 1, 0));
            if (saved.wordMode !== undefined) wordMode = !!saved.wordMode;
        }

        function save() {
            localStorage.setItem('eng_zinnen_u45', JSON.stringify({
                diffIndices: difficultWords.map(w => allWords.indexOf(w)),
                lastIdx: idx,
                wordMode
            }));
        }

        function update() {
            if (!currentList.length) return;
            card.classList.remove('is-flipped');
            const item = currentList[idx];
            if (wordMode) {
                textFront.innerHTML = `<strong>${item.word}</strong>`;
                textBack.innerHTML = `<div class="back-nl">${item.nl}</div><div style="margin-top:12px;font-size:0.95rem;opacity:.8;line-height:1.45;">${item.sentence}</div>`;
                document.getElementById('label-front').textContent = 'Engels woord';
                document.getElementById('label-back').textContent = 'Betekenis + zin';
            } else {
                textFront.innerHTML = item.sentence;
                textBack.innerHTML = `<div class="back-word">${item.word}</div><div class="back-nl">${item.nl}</div>`;
                document.getElementById('label-front').textContent = 'Engelse zin';
                document.getElementById('label-back').textContent = 'Woord + betekenis';
            }
            prog.textContent = `Kaart ${idx + 1} van ${currentList.length}`;
            card.classList.toggle('is-marked', difficultWords.includes(item));
            document.getElementById('filter-btn').textContent = `Focus op moeilijk (${difficultWords.length})`;
            document.getElementById('lang-btn').textContent = wordMode ? '🔄 Woord ➔ Zin' : '🔄 Zin ➔ Woord';
            save();
        }

        function flip() { card.classList.toggle('is-flipped'); }
        function next() { idx = (idx + 1) % currentList.length; update(); }
        function prev() { idx = (idx - 1 + currentList.length) % currentList.length; update(); }
        function shuffle() { currentList = [...currentList].sort(() => Math.random() - 0.5); idx = 0; update(); }
        function toggleMode() { wordMode = !wordMode; update(); }
        function mark() {
            const item = currentList[idx];
            if (!difficultWords.includes(item)) difficultWords.push(item);
            else difficultWords = difficultWords.filter(w => w !== item);
            update();
        }
        function toggleFilter() {
            filterOn = !filterOn;
            currentList = filterOn ? [...difficultWords] : [...allWords];
            if (currentList.length === 0 && filterOn) {
                alert('Geen moeilijke woorden!');
                filterOn = false;
                currentList = [...allWords];
            }
            idx = 0;
            update();
        }
        function speak() {
            const item = currentList[idx];
            const text = wordMode ? item.word : item.sentence.replace(/<[^>]*>/g, '');
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-GB';
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function openList() { document.getElementById('list-modal').style.display = 'block'; renderList(); }
        function closeList() { document.getElementById('list-modal').style.display = 'none'; }
        function setSort(m) {
            sortMode = m;
            document.getElementById('sort-std').className = m === 'std' ? 'active' : '';
            document.getElementById('sort-diff').className = m === 'diff' ? 'active' : '';
            renderList();
        }

        function renderList() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            let list = allWords.map((w, i) => ({ ...w, origIdx: i }));
            if (sortMode === 'diff') {
                list.sort((a, b) => difficultWords.includes(allWords[b.origIdx]) - difficultWords.includes(allWords[a.origIdx]));
            }

            list.forEach(w => {
                const haystack = `${w.word} ${w.nl} ${w.sentence.replace(/<[^>]*>/g, '')}`.toLowerCase();
                if (haystack.includes(q)) {
                    const div = document.createElement('div');
                    div.className = 'word-item';
                    div.innerHTML = `
                        <div>
                            <span class="en">${w.word}</span><br>
                            <span class="nl">${w.nl}</span>
                            <div class="ex">${w.sentence}</div>
                        </div>
                        <span>${difficultWords.includes(allWords[w.origIdx]) ? '★' : ''}</span>`;
                    div.onclick = () => {
                        filterOn = false;
                        currentList = [...allWords];
                        idx = w.origIdx;
                        update();
                        closeList();
                    };
                    container.appendChild(div);
                }
            });
        }

        function resetProgress() {
            if (confirm('Wis voortgang?')) {
                localStorage.removeItem('eng_zinnen_u45');
                location.reload();
            }
        }

        load();
        update();
    </script>
</body>
